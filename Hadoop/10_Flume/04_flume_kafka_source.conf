# ─────────────────────────────────────────────────────────────────────────────
# 04_flume_kafka_source.conf — Kafka Source → File Channel → HDFS Sink
#
# Use case: Consume from Kafka topic and land data to HDFS (Kafka → HDFS pipeline)
# Start:    flume-ng agent --conf-file 04_flume_kafka_source.conf --name kafka2hdfs
# ─────────────────────────────────────────────────────────────────────────────

kafka2hdfs.sources  = kafka_src
kafka2hdfs.channels = file_ch
kafka2hdfs.sinks    = hdfs_sink

# ── Source: Kafka Source ──────────────────────────────────────────────────────
kafka2hdfs.sources.kafka_src.type = org.apache.flume.source.kafka.KafkaSource
kafka2hdfs.sources.kafka_src.kafka.bootstrap.servers = kafka:9092
# Consume from one or more topics (comma-separated)
kafka2hdfs.sources.kafka_src.kafka.topics = user-events,app-logs
# Consumer group ID
kafka2hdfs.sources.kafka_src.kafka.consumer.group.id = flume-hdfs-consumer
# Max events per batch
kafka2hdfs.sources.kafka_src.batchSize = 1000
# Max time to wait for batch to fill (ms)
kafka2hdfs.sources.kafka_src.batchDurationMillis = 1000
# Commit offsets on channel take (exactly-once with file channel)
kafka2hdfs.sources.kafka_src.kafka.consumer.auto.offset.reset = latest
# Put Kafka topic name in header
kafka2hdfs.sources.kafka_src.kafka.consumer.setTopicHeader = true
kafka2hdfs.sources.kafka_src.kafka.consumer.topicHeader = topic

# Interceptors: timestamp + regex filtering
kafka2hdfs.sources.kafka_src.interceptors = ts regex_filter
kafka2hdfs.sources.kafka_src.interceptors.ts.type = timestamp
# Drop events matching error pattern (optional regex filter interceptor)
kafka2hdfs.sources.kafka_src.interceptors.regex_filter.type               = regex_filter
kafka2hdfs.sources.kafka_src.interceptors.regex_filter.regex              = .*DEBUG.*
kafka2hdfs.sources.kafka_src.interceptors.regex_filter.excludeEvents      = true

# ── Channel: File Channel (durable — offset committed only after HDFS write) ──
kafka2hdfs.channels.file_ch.type                  = file
kafka2hdfs.channels.file_ch.checkpointDir         = /var/flume/kafka2hdfs/checkpoint
kafka2hdfs.channels.file_ch.dataDirs              = /var/flume/kafka2hdfs/data
kafka2hdfs.channels.file_ch.capacity              = 100000
kafka2hdfs.channels.file_ch.transactionCapacity   = 10000

# ── Sink: HDFS partitioned by topic and time ──────────────────────────────────
kafka2hdfs.sinks.hdfs_sink.type                        = hdfs
kafka2hdfs.sinks.hdfs_sink.hdfs.path                   = hdfs://namenode:9000/kafka-landing/%{topic}/%Y/%m/%d/%H
kafka2hdfs.sinks.hdfs_sink.hdfs.filePrefix             = part
kafka2hdfs.sinks.hdfs_sink.hdfs.fileSuffix             = .json
kafka2hdfs.sinks.hdfs_sink.hdfs.fileType               = DataStream
kafka2hdfs.sinks.hdfs_sink.hdfs.writeFormat            = Text
kafka2hdfs.sinks.hdfs_sink.hdfs.rollInterval           = 600   # 10 minutes
kafka2hdfs.sinks.hdfs_sink.hdfs.rollSize               = 268435456  # 256 MB
kafka2hdfs.sinks.hdfs_sink.hdfs.rollCount              = 0
kafka2hdfs.sinks.hdfs_sink.hdfs.idleTimeout            = 120
kafka2hdfs.sinks.hdfs_sink.hdfs.useLocalTimeStamp      = true
kafka2hdfs.sinks.hdfs_sink.hdfs.threadsPoolSize        = 10
kafka2hdfs.sinks.hdfs_sink.hdfs.batchSize              = 1000
kafka2hdfs.sinks.hdfs_sink.channel = file_ch

# ── Bind ──────────────────────────────────────────────────────────────────────
kafka2hdfs.sources.kafka_src.channels = file_ch
kafka2hdfs.sinks.hdfs_sink.channel    = file_ch
