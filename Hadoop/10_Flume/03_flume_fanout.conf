# ─────────────────────────────────────────────────────────────────────────────
# 03_flume_fanout.conf — Fan-out topology: 1 Source → 2 Sinks (HDFS + Kafka)
#
# Use case: Duplicate event stream — persist to HDFS AND forward to Kafka
# Start:    flume-ng agent --conf-file 03_flume_fanout.conf --name fanout_agent
# ─────────────────────────────────────────────────────────────────────────────

fanout_agent.sources  = exec_src
fanout_agent.channels = hdfs_ch kafka_ch
fanout_agent.sinks    = hdfs_sink kafka_sink

# ── Source: Exec (tail a command output) ──────────────────────────────────────
fanout_agent.sources.exec_src.type    = exec
fanout_agent.sources.exec_src.command = tail -F /var/log/app/events.log
fanout_agent.sources.exec_src.batchSize = 20
fanout_agent.sources.exec_src.batchTimeout = 3000  # ms

# Interceptor: add static header (e.g. environment tag)
fanout_agent.sources.exec_src.interceptors = static_interceptor
fanout_agent.sources.exec_src.interceptors.static_interceptor.type = static
fanout_agent.sources.exec_src.interceptors.static_interceptor.key   = env
fanout_agent.sources.exec_src.interceptors.static_interceptor.value = production

# Fan-out: replicate events to BOTH channels
fanout_agent.sources.exec_src.selector.type = replicating
fanout_agent.sources.exec_src.channels = hdfs_ch kafka_ch

# ── Channel 1: Memory → HDFS ──────────────────────────────────────────────────
fanout_agent.channels.hdfs_ch.type              = memory
fanout_agent.channels.hdfs_ch.capacity          = 10000
fanout_agent.channels.hdfs_ch.transactionCapacity = 1000

# ── Channel 2: Memory → Kafka ─────────────────────────────────────────────────
fanout_agent.channels.kafka_ch.type              = memory
fanout_agent.channels.kafka_ch.capacity          = 5000
fanout_agent.channels.kafka_ch.transactionCapacity = 500

# ── Sink 1: HDFS ──────────────────────────────────────────────────────────────
fanout_agent.sinks.hdfs_sink.type                    = hdfs
fanout_agent.sinks.hdfs_sink.hdfs.path               = hdfs://namenode:9000/flume/fanout/%Y/%m/%d
fanout_agent.sinks.hdfs_sink.hdfs.filePrefix         = events
fanout_agent.sinks.hdfs_sink.hdfs.fileSuffix         = .log
fanout_agent.sinks.hdfs_sink.hdfs.fileType           = DataStream
fanout_agent.sinks.hdfs_sink.hdfs.writeFormat        = Text
fanout_agent.sinks.hdfs_sink.hdfs.rollInterval       = 300
fanout_agent.sinks.hdfs_sink.hdfs.rollSize           = 67108864  # 64 MB
fanout_agent.sinks.hdfs_sink.hdfs.rollCount          = 0
fanout_agent.sinks.hdfs_sink.hdfs.useLocalTimeStamp  = true
fanout_agent.sinks.hdfs_sink.channel = hdfs_ch

# ── Sink 2: Kafka ──────────────────────────────────────────────────────────────
fanout_agent.sinks.kafka_sink.type                        = org.apache.flume.sink.kafka.KafkaSink
fanout_agent.sinks.kafka_sink.kafka.topic                 = flume-events
fanout_agent.sinks.kafka_sink.kafka.bootstrap.servers     = kafka:9092
fanout_agent.sinks.kafka_sink.kafka.flumeBatchSize        = 20
fanout_agent.sinks.kafka_sink.kafka.producer.acks         = 1
fanout_agent.sinks.kafka_sink.kafka.producer.linger.ms    = 1
fanout_agent.sinks.kafka_sink.kafka.producer.compression.type = snappy
fanout_agent.sinks.kafka_sink.channel = kafka_ch
