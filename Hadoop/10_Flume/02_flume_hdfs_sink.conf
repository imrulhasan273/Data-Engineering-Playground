# ─────────────────────────────────────────────────────────────────────────────
# 02_flume_hdfs_sink.conf — Taildir Source → File Channel → HDFS Sink
#
# Use case: Tail application log files → write to HDFS with time-based partitioning
# Start:    flume-ng agent --conf-file 02_flume_hdfs_sink.conf --name hdfs_agent
# ─────────────────────────────────────────────────────────────────────────────

hdfs_agent.sources  = taildir_src
hdfs_agent.channels = file_ch
hdfs_agent.sinks    = hdfs_sink

# ── Source: Taildir (tails multiple files, remembers position after restart) ──
hdfs_agent.sources.taildir_src.type = TAILDIR
# JSON file tracking position of each tailed file (survives restarts)
hdfs_agent.sources.taildir_src.positionFile = /var/flume/taildir_position.json
# filegroups: named groups of files to tail
hdfs_agent.sources.taildir_src.filegroups = app_logs web_logs
# app_logs group: tail all .log files in /var/log/app/
hdfs_agent.sources.taildir_src.filegroups.app_logs = /var/log/app/.*\\.log
# web_logs group: tail access.log
hdfs_agent.sources.taildir_src.filegroups.web_logs = /var/log/nginx/access.log
# Optional: add header with filename to each event
hdfs_agent.sources.taildir_src.fileHeader = true
hdfs_agent.sources.taildir_src.fileHeaderKey = filename
# Batch size (events sent to channel per transaction)
hdfs_agent.sources.taildir_src.batchSize = 100

# ── Interceptors: add timestamp and hostname headers ─────────────────────────
hdfs_agent.sources.taildir_src.interceptors = ts_interceptor host_interceptor
hdfs_agent.sources.taildir_src.interceptors.ts_interceptor.type   = timestamp
hdfs_agent.sources.taildir_src.interceptors.host_interceptor.type = host
hdfs_agent.sources.taildir_src.interceptors.host_interceptor.hostHeader = hostname

# ── Channel: File Channel (durable — survives agent restart) ─────────────────
hdfs_agent.channels.file_ch.type            = file
hdfs_agent.channels.file_ch.checkpointDir   = /var/flume/checkpoint
hdfs_agent.channels.file_ch.dataDirs        = /var/flume/data
hdfs_agent.channels.file_ch.capacity        = 10000
hdfs_agent.channels.file_ch.transactionCapacity = 1000

# ── Sink: HDFS Sink (writes to HDFS with time-partitioned directories) ────────
hdfs_agent.sinks.hdfs_sink.type = hdfs
# Path with time-based partitioning using event timestamp header
hdfs_agent.sinks.hdfs_sink.hdfs.path = hdfs://namenode:9000/flume/logs/%{filename}/%Y/%m/%d/%H
# File prefix and suffix
hdfs_agent.sinks.hdfs_sink.hdfs.filePrefix = events
hdfs_agent.sinks.hdfs_sink.hdfs.fileSuffix = .log
# File format: Text, SequenceFile, or DataStream
hdfs_agent.sinks.hdfs_sink.hdfs.fileType = DataStream
# Write format: Text (one event per line) or Writable
hdfs_agent.sinks.hdfs_sink.hdfs.writeFormat = Text
# Roll (close) file every 300 seconds
hdfs_agent.sinks.hdfs_sink.hdfs.rollInterval = 300
# Roll file when it reaches 128 MB
hdfs_agent.sinks.hdfs_sink.hdfs.rollSize = 134217728
# Roll file after 1000 events (set 0 to disable count-based rolling)
hdfs_agent.sinks.hdfs_sink.hdfs.rollCount = 0
# Idle timeout: close file if no events for 60 seconds
hdfs_agent.sinks.hdfs_sink.hdfs.idleTimeout = 60
# Number of parallel HDFS writers
hdfs_agent.sinks.hdfs_sink.hdfs.threadsPoolSize = 10
# Batch size per transaction
hdfs_agent.sinks.hdfs_sink.hdfs.batchSize = 100
# Use local time zone for path substitution
hdfs_agent.sinks.hdfs_sink.hdfs.useLocalTimeStamp = true
# Compress output (requires snappy native libs)
hdfs_agent.sinks.hdfs_sink.hdfs.codeC = snappy

# ── Bind ──────────────────────────────────────────────────────────────────────
hdfs_agent.sources.taildir_src.channels = file_ch
hdfs_agent.sinks.hdfs_sink.channel      = file_ch
