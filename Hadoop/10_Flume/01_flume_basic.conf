# ─────────────────────────────────────────────────────────────────────────────
# 01_flume_basic.conf — Basic Flume Agent: Netcat Source → Memory Channel → Logger Sink
#
# Start: flume-ng agent --conf-file 01_flume_basic.conf --name agent1 -Dflume.root.logger=INFO,console
# Test:  echo "Hello Flume" | nc localhost 44444
# ─────────────────────────────────────────────────────────────────────────────

# Agent name: agent1
# Components: source (r1), channel (c1), sink (k1)

agent1.sources  = r1
agent1.channels = c1
agent1.sinks    = k1

# ── Source: Netcat (listen on TCP port 44444) ─────────────────────────────────
agent1.sources.r1.type     = netcat
agent1.sources.r1.bind     = 0.0.0.0
agent1.sources.r1.port     = 44444

# ── Channel: Memory (fast, data lost on crash) ────────────────────────────────
agent1.channels.c1.type              = memory
agent1.channels.c1.capacity          = 1000     # max events in channel
agent1.channels.c1.transactionCapacity = 100    # events per transaction

# ── Sink: Logger (prints events to log — for testing only) ────────────────────
agent1.sinks.k1.type = logger

# ── Bind source → channel → sink ─────────────────────────────────────────────
agent1.sources.r1.channels = c1
agent1.sinks.k1.channel    = c1
