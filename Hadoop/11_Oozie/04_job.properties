# ─────────────────────────────────────────────────────────────────────────────
# 04_job.properties — Parameters for Oozie workflow/coordinator submission
#
# Usage:
#   Workflow:    oozie job -oozie http://localhost:11000/oozie -config 04_job.properties -run
#   Coordinator: oozie job -oozie http://localhost:11000/oozie -config 04_job.properties -run
# ─────────────────────────────────────────────────────────────────────────────

# Oozie server URL
oozie.url=http://localhost:11000/oozie

# Cluster connection details
nameNode=hdfs://namenode:9000
jobTracker=resourcemanager:8032

# Path to workflow.xml or coordinator.xml in HDFS
# Upload first: hdfs dfs -put . hdfs:///oozie/apps/wordcount/
oozie.wf.application.path=${nameNode}/oozie/apps/wordcount/workflow.xml
# For coordinator:
# oozie.coord.application.path=${nameNode}/oozie/apps/wordcount/coordinator.xml
# For bundle:
# oozie.bundle.application.path=${nameNode}/oozie/apps/bundle.xml

# Workflow-specific parameters (used by EL expressions in workflow.xml)
workflowAppPath=${nameNode}/oozie/apps/wordcount
inputDir=${nameNode}/data/input/sample.txt
outputDir=${nameNode}/data/output
dbName=oozie_demo

# Coordinator-specific parameters
startTime=2024-01-01T00:00Z
endTime=2025-01-01T00:00Z

# Bundle parameters
kickOffTime=2024-01-01T00:00Z

# YARN queue
queueName=default

# Oozie workflow libraries (jars needed by MR jobs)
# oozie.libpath=${nameNode}/oozie/share/lib

# User to run as
user.name=root
